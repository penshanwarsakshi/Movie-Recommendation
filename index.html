<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <h1>🎬 Movie Chatbot</h1>
        <div class="chat-box" id="chat-box">
            <div class="bot-message">Hi! I can help you find a movie. Choose a mood:</div>
        </div>
        <div class="buttons">
            <button onclick="userChoice('Excited')">Excited</button>
            <button onclick="userChoice('Relaxed')">Relaxed</button>
            <button onclick="userChoice('Romantic')">Romantic</button>
            <button onclick="userChoice('Thrilled')">Thrilled</button>
            <button onclick="userChoice('Random')">Surprise Me 🎲</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
